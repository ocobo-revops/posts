name: Content sync

on:
  # Runs on every PR. `sync-and-validate` is a required status check on `main`;
  # a path filter here would mean PRs that touch no content path (docs, config)
  # never report the check and can never merge. The upload step no-ops when no
  # assets changed, so docs-only PRs just run `pnpm validate` and pass.
  pull_request:

permissions:
  contents: write
  checks: write

jobs:
  sync-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Re-encode oversized images in place BEFORE upload, so the optimised bytes
      # are what gets pushed to Blob (and committed back below). The local
      # `/publish-content` flow also optimises, but contributors can bypass it
      # (raw multi-MB images shipped straight to Blob in #73); this makes
      # optimisation hold regardless of how the PR was authored. Scopes to assets
      # changed vs the base ref because the CI working tree is clean.
      - name: Optimize changed images
        run: |
          git fetch origin ${{ github.base_ref }}
          node scripts/optimize-assets.js --write --base origin/${{ github.base_ref }}

      - name: Upload new assets to Vercel Blob
        id: upload
        env:
          NEW_BLOB_READ_WRITE_TOKEN: ${{ secrets.NEW_BLOB_READ_WRITE_TOKEN }}
        run: |
          git fetch origin ${{ github.base_ref }}
          set +e
          output=$(node scripts/upload-assets.js --target new --base origin/${{ github.base_ref }} 2>&1)
          code=$?
          set -e
          echo "$output"
          if [ $code -ne 0 ]; then
            echo "::error::upload-assets exited with code $code"
            exit $code
          fi
          if echo "$output" | grep -qE "Uploading [1-9]"; then
            echo "uploaded=true" >> $GITHUB_OUTPUT
          else
            echo "uploaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Rewrite local asset paths to blob URLs
        if: steps.upload.outputs.uploaded == 'true'
        run: pnpm update-urls:new

      - name: Validate content
        run: pnpm validate

      - name: Commit back optimised images and rewritten URLs
        id: commit_back
        env:
          GH_PAT: ${{ secrets.OCOBO_POST_CLI }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore(assets): optimise images and rewrite local paths to Vercel Blob URLs [skip ci]"
            git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git HEAD:${{ github.head_ref }}
            echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi

      - name: Forward passing check to commit-back SHA
        if: steps.commit_back.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            --method POST \
            -f name=sync-and-validate \
            -f head_sha=${{ steps.commit_back.outputs.new_sha }} \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Content sync passed" \
            -f "output[summary]=Assets uploaded and URLs rewritten. Content validated."
